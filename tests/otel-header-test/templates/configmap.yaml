apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-header-test-config
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
            include_metadata: true

    processors:
      resource:
        attributes:
          - key: service.name
            value: otel-header-test
            action: upsert

    exporters:
      otlphttp:
        endpoint: {{ .Values.alloyEndpoint | quote }}
        headers:
          X-Scope-OrgID: {{ .Values.tenant | quote }}
        tls:
          insecure: true

      debug:
        verbosity: detailed

    extensions:
      health_check: {}

    service:
      extensions: [health_check]
      pipelines:
        traces:
          receivers: [otlp]
          processors: [resource]
          exporters: [otlphttp, debug]
        logs:
          receivers: [otlp]
          processors: [resource]
          exporters: [otlphttp, debug]
        metrics:
          receivers: [otlp]
          processors: [resource]
          exporters: [otlphttp, debug]
