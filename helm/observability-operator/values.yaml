# Operator Configuration Reference
# This document covers all Helm values for deploying the observability-operator.

image:
  registry: gsoci.azurecr.io
  name: "giantswarm/observability-operator"
  tag: ""

# Metadata about the management cluster. Required for the operator to function correctly.
managementCluster:
  # -- Base domain of the management cluster (e.g. example.gigantic.io)
  baseDomain: domain
  # -- cert-manager ClusterIssuer used for webhook TLS
  clusterIssuer: selfsigned-giantswarm
  # -- Customer identifier
  customer: customer
  # -- Skip CA verification — for development only
  insecureCA: false
  # -- Cluster name
  name: name
  # -- Pipeline identifier (e.g. stable, testing)
  pipeline: pipeline
  # -- Region identifier
  region: region

# Controls Alertmanager config delivery, Grafana alerting, and Cronitor heartbeats.
alerting:
  # -- Enable alerting support
  enabled: false
  # -- URL of the Mimir Alertmanager API
  alertmanagerURL: ""
  # -- Grafana instance address
  grafanaAddress: ""
  # -- Slack API token for the default Slack receiver
  slackAPIToken: ""
  # -- Cronitor ping key for heartbeat alerts
  cronitorHeartbeatPingKey: ""
  # -- Cronitor management key
  cronitorHeartbeatManagementKey: ""

# Cronitor heartbeat monitor operational settings.
cronitor:
  # -- Seconds after a missed heartbeat before Cronitor fires an alert
  graceSeconds: 1800
  # -- Expected heartbeat frequency (e.g. "every 30 minutes")
  schedule: "every 30 minutes"
  # -- How often Cronitor re-alerts while the monitor remains in a failing state
  realertInterval: "every 24 hours"
  # -- List of team-specific configs for per-team PagerDuty routing
  # Expected team contents:
  #  - name: teamA
  #    pagerdutyToken: token-for-teamA
  teams: []

# Default tenant ID used when no tenant label is present on a cluster.
defaultTenant: "giantswarm"

# HTTP client timeouts for external API calls.
http:
  # -- Timeout for ruler (Mimir/Loki) HTTP requests
  rulerTimeout: 30s
  # -- Timeout for Alertmanager HTTP requests
  alertmanagerTimeout: 30s
  # -- Timeout for Mimir TSDB head series queries
  mimirQueryTimeout: 2m

# OTLP exporter batch settings (applied to the events collector).
otlp:
  # -- Number of items to batch before flushing
  batchSendBatchSize: 1024
  # -- Maximum batch size (hard cap)
  batchMaxSize: 1024
  # -- Maximum wait before flushing an incomplete batch
  batchTimeout: "500ms"

# Controls metrics collection from workload clusters via Alloy agents.
# Per-cluster overrides for sharding are also available via Cluster annotations. See cluster.md.
# NOTE for local development: All queueConfig fields can also be set via CLI flags when running
# the operator binary directly (e.g. make run-local):
# --monitoring-queue-config-batch-send-deadline, --monitoring-queue-config-capacity,
# --monitoring-queue-config-max-shards, etc. CLI flags take precedence over Helm values if explicitly set.
# Tuning guidelines:
#   High throughput: increase maxShards and maxSamplesPerSend; consider increasing capacity
#   Low latency: decrease batchSendDeadline; increase minShards
#   Memory constrained: decrease capacity and maxShards
#   Unreliable network: increase maxBackoff; enable retryOnHttp429; set a sampleAgeLimit to avoid accumulating stale data
# Monitoring queue health (metrics emitted by Alloy agent on each workload cluster, visible on the Prometheus / Remote Write Grafana dashboard):
#   prometheus_remote_storage_shards: Current shard count
#   prometheus_remote_storage_shards_desired: Desired shard count (what the autoscaler is targeting)
#   prometheus_remote_storage_samples_pending: Samples pending in queues
#   prometheus_remote_storage_shard_capacity: Capacity per shard
monitoring:
  # -- Enable monitoring at the installation level
  enabled: false

  # -- Enable network monitoring
  enableNetworkMonitoring: false

  otlp:
    # -- Enable OTLP metrics ingestion via the events collector (requires monitoring.enabled=true)
    enabled: true

  sharding:
    # -- Time series count per Alloy shard
    scaleUpSeriesCount: 1000000
    # -- Scale-down threshold as a fraction of scaleUpSeriesCount
    scaleDownPercentage: 0.20
  wal:
    # -- How often to truncate the WAL
    truncateFrequency: 15m
  queueConfig:
    # -- Queue configuration for remote write. If not set, Alloy defaults will be used.
    # All fields are optional; uncomment to override:
    # batchSendDeadline: "5s"  # Max time samples wait before sending
    # -- Samples buffered per shard
    capacity: 30000
    # maxBackoff: "5s"  # Maximum retry delay
    # -- Maximum samples per send
    maxSamplesPerSend: 150000
    # -- Maximum concurrent shards
    maxShards: 10
    # minBackoff: "30ms"  # Initial retry delay
    # minShards: 1  # Minimum concurrent shards
    # retryOnHttp429: true  # Retry on HTTP 429 responses
    # -- Max age of samples to send (0s = disabled)
    sampleAgeLimit: "30m"
  exemplars:
    # -- Enable exemplar forwarding in the remote write pipeline.
    # Requires Mimir to have exemplar storage enabled (max_global_exemplars_per_user > 0).
    enabled: true

  # -- Timeout for Alloy Mimir remote write operations
  mimirRemoteWriteTimeout: "60s"

  ruler:
    # -- URL to the Mimir ruler API for deleting rules when a cluster is deleted.
    url: "http://mimir-gateway.mimir.svc"

  gateway:
    # -- Kubernetes namespace where the Mimir gateway secrets reside
    namespace: "mimir"
    # -- Name of the Ingress auth secret in the Mimir gateway namespace
    ingressSecretName: "mimir-gateway-ingress-auth"
    # -- Name of the HTTPRoute auth secret in the Mimir gateway namespace
    httprouteSecretName: "mimir-gateway-httproute-auth"

# Enable or disable distributed tracing support
tracing:
  # -- Enable distributed tracing support
  enabled: false

  gateway:
    # -- Kubernetes namespace where the Tempo gateway secrets reside
    namespace: "tempo"
    # -- Name of the Ingress auth secret in the Tempo gateway namespace
    ingressSecretName: "tempo-gateway-ingress-auth"
    # -- Name of the HTTPRoute auth secret in the Tempo gateway namespace
    httprouteSecretName: "tempo-gateway-httproute-auth"

# Controls log collection and related features.
logging:
  # -- Enable logging support
  enabled: false
  otlp:
    # -- Enable OTLP log ingestion via the events collector (requires logging.enabled=true)
    enabled: true

  # -- Enable log filtering
  enableNodeFiltering: false

  # -- Default namespaces to collect logs from
  defaultNamespaces: []
  # Example:
  #   - kube-system
  #   - default

  # -- Namespaces to include for Kubernetes events
  includeEventsFromNamespaces: []
  # -- Namespaces to exclude for Kubernetes events
  excludeEventsFromNamespaces: []

  # -- Maximum backoff period for Alloy Loki remote write retries
  lokiMaxBackoffPeriod: "10m"
  # -- Timeout for Alloy Loki remote write operations
  lokiRemoteTimeout: "60s"

  ruler:
    # -- URL to the Loki ruler API for deleting rules when a cluster is deleted.
    url: "http://loki-gateway.loki.svc"

  gateway:
    # -- Kubernetes namespace where the Loki gateway secrets reside
    namespace: "loki"
    # -- Name of the Ingress auth secret in the Loki gateway namespace
    ingressSecretName: "loki-gateway-ingress-auth"
    # -- Name of the HTTPRoute auth secret in the Loki gateway namespace
    httprouteSecretName: "loki-gateway-httproute-auth"

# Resource and security configuration for the operator pod.
# Defaults are appropriate for most deployments.
operator:
  # -- Resource requests and limits for the operator deployment
  resources:
    requests:
      # -- CPU request
      cpu: 100m
      # -- Memory request
      memory: 100Mi
    limits:
      # -- CPU limit
      cpu: 100m
      # -- Memory limit
      memory: 150Mi

  # -- TLS configuration for the operator's metrics endpoint
  # By default, metrics are exposed over HTTP. For production deployments, enable TLS
  # to secure the metrics endpoint using cert-manager certificates.
  # To enable:
  #   1. Ensure cert-manager is installed and working in the cluster
  #   2. Set operator.metricsServerCertificate.enabled: true
  #   3. The Certificate resource will be automatically created using the configured managementCluster.clusterIssuer
  #   4. The PodMonitor will automatically configure Prometheus to scrape over HTTPS with proper certificate verification
  metricsServerCertificate:
    # -- Enable TLS for the metrics server endpoint using cert-manager
    enabled: true
    # -- Name of the secret containing the metrics server TLS certificate
    secretName: "metrics-server-cert"

  # -- Container security context
  containerSecurityContext:
    # -- Prevent privilege escalation
    allowPrivilegeEscalation: false
    # -- Use read-only root filesystem
    readOnlyRootFilesystem: true
    # -- Security profile type
    seccompProfile:
      type: RuntimeDefault
    # -- Capabilities to drop
    capabilities:
      drop:
        - ALL
  # -- Pod security context
  podSecurityContext:
    # -- Run as non-root user
    runAsNonRoot: true
    # -- User ID to run as
    runAsUser: 65534
    # -- Security profile type
    seccompProfile:
      type: RuntimeDefault

# Grafana connection settings.
grafana:
  # -- URL of the Grafana instance
  url: "http://grafana.monitoring.svc.cluster.local"
  # -- Number of retries for Grafana API requests
  clientRetries: 3
  # -- Kubernetes namespace containing the Grafana admin credentials secret
  adminSecretNamespace: "monitoring"
  # -- Name of the Kubernetes secret containing Grafana admin credentials
  adminSecretName: "grafana"
  # -- Kubernetes namespace containing the Grafana Gateway TLS secret
  gatewayTLSSecretNamespace: "envoy-gateway-system"
  # -- Name of the Kubernetes secret containing the Grafana Gateway TLS certificate
  gatewayTLSSecretName: "gateway-giantswarm-default-https-tls"
  # -- Service URLs for Grafana datasources provisioned by the operator.
  # Override these if your stack uses non-standard namespaces or service names.
  datasources:
    # -- URL of the Loki gateway service
    lokiURL: "http://loki-gateway.loki.svc"
    # -- URL of the Mimir gateway (Prometheus-compatible endpoint)
    mimirURL: "http://mimir-gateway.mimir.svc/prometheus"
    # -- URL of the Mimir Alertmanager service
    mimirAlertmanagerURL: "http://mimir-alertmanager.mimir.svc:8080"
    # -- URL of the Mimir cardinality API
    mimirCardinalityURL: "http://mimir-gateway.mimir.svc:8080/prometheus/api/v1/cardinality/"
    # -- URL of the Tempo query-frontend service
    tempoURL: "http://tempo-query-frontend.tempo.svc:3200"

# Controls the validating webhook configuration.
webhook:
  # -- Enable webhook validation globally
  enabled: true
  # -- Configure individual webhooks
  validatingWebhooks:
    # -- Validate alertmanager config secrets
    alertmanagerConfig:
      enabled: true
    # -- Validate dashboard ConfigMaps
    dashboardConfigMap:
      enabled: true
    # -- Validate GrafanaOrganization CRs
    grafanaOrganization:
      enabled: true
