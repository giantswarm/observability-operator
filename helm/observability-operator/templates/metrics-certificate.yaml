{{- if .Values.operator.metricsServerCertificate.enabled }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  labels:
    {{- include "labels.common" . | nindent 4 }}
  name: {{ include "resource.default.name" . }}-metrics-cert
  namespace: {{ include "resource.default.namespace" . }}
spec:
  dnsNames:
  - {{ include "resource.default.name" . }}.{{ include "resource.default.namespace" . }}.svc
  - {{ include "resource.default.name" . }}.{{ include "resource.default.namespace" . }}.svc.cluster.local
  issuerRef:
    kind: ClusterIssuer
    name: {{ .Values.managementCluster.clusterIssuer }}
  secretName: {{ .Values.operator.metricsServerCertificate.secretName }}
{{- end }}
