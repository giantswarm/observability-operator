# This file was generated by observability-operator.
# It configures Alloy for events logging (loki.write + OTLP), tracing, and OTLP metrics ingestion.
# - configMap is generated from events-logger.alloy.template and passed as a string
#   here and will be created by Alloy's chart.
# - Alloy runs as a deployment, with only 1 replica.
networkPolicy:
  cilium:
    egress:
    - toEntities:
      - kube-apiserver
      - cluster # (needed for access to the gateway)
      - world
    # Allow DNS resolution
    - toEndpoints:
      - matchLabels:
          k8s-app: coredns
      - matchLabels:
          k8s-app: k8s-dns-node-cache
      toPorts:
      - ports:
        - port: "53"
          protocol: ANY
        - port: "1053"
          protocol: ANY
        rules:
          dns:
            - matchPattern: '*'
    ingress:
    - toPorts:
      - ports:
        # Alloy UI and API
        - port: "12345"
          protocol: TCP
        # OTLP gRPC receiver
        - port: "4317"
          protocol: "TCP"
        # OTLP HTTP receiver
        - port: "4318"
          protocol: "TCP"

alloy:
  alloy:
    configMap:
      create: true
      content: |-
        logging {
          level  = "warn"
          format = "logfmt"
        }
        remote.kubernetes.secret "credentials" {
          namespace = "kube-system"
          name = "alloy-events"
        }
        // Kubernetes events source for Loki
        loki.source.kubernetes_events "default" {
          namespaces = []
          forward_to = [loki.write.default.receiver]
        }
        // Write Kubernetes events to Loki
        loki.write "default" {
          endpoint {
            max_backoff_period = "10m"
            remote_timeout     = "60s"
            tenant_id          = convert.nonsensitive(remote.kubernetes.secret.credentials.data["logging-tenant-id"])
            url                = convert.nonsensitive(remote.kubernetes.secret.credentials.data["logging-url"])
            basic_auth {
              username = convert.nonsensitive(remote.kubernetes.secret.credentials.data["logging-username"])
              password = remote.kubernetes.secret.credentials.data["logging-password"]
            }
          }
          external_labels = {
            cluster_id       = "test-installation",
            cluster_type     = "management_cluster",
            organization     = "test-organization",
            provider         = "capa",
            scrape_job       = "kubernetes-events",
          }
        }
        // Basic authentication for Tempo
        otelcol.auth.basic "tempo_credentials" {
          username = convert.nonsensitive(remote.kubernetes.secret.credentials.data["tracing-username"])
          password = remote.kubernetes.secret.credentials.data["tracing-password"]
        }
        // Basic authentication for Mimir
        otelcol.auth.basic "mimir_credentials" {
          username = convert.nonsensitive(remote.kubernetes.secret.credentials.data["metrics-username"])
          password = remote.kubernetes.secret.credentials.data["metrics-password"]
        }
        // Basic authentication for Loki
        otelcol.auth.basic "loki_credentials" {
          username = convert.nonsensitive(remote.kubernetes.secret.credentials.data["logging-username"])
          password = remote.kubernetes.secret.credentials.data["logging-password"]
        }
        // OTLP receiver — accepts traces, metrics, and logs from cluster workloads.
        // include_metadata = true propagates HTTP headers and gRPC metadata to downstream
        // processors, enabling the X-Scope-OrgID header to be used for tenant routing.
        otelcol.receiver.otlp "default" {
          grpc {
            endpoint         = "0.0.0.0:4317"
            include_metadata = true
          }
          http {
            endpoint         = "0.0.0.0:4318"
            include_metadata = true
          }
          output {
            traces = [otelcol.processor.k8sattributes.default.input]
            metrics = [otelcol.processor.k8sattributes.default.input]
            logs = [otelcol.processor.k8sattributes.default.input]
          }
        }
        // Add Kubernetes metadata to all OTLP signals.
        // The tenant pod label is extracted to giantswarm.tenant.from-label (a temporary
        // attribute) rather than directly to giantswarm.tenant; validation and final
        // assignment happen in the transform processor below.
        otelcol.processor.k8sattributes "default" {
          extract {
            metadata = [
              "k8s.namespace.name",
              "k8s.pod.name",
              "k8s.container.name",
            ]
            label {
              key      = "observability.giantswarm.io/tenant"
              tag_name = "giantswarm.tenant.from-label"
            }
            otel_annotations = true
          }
          output {
            traces = [otelcol.processor.attributes.extract_tenant_header.input]
            metrics = [otelcol.processor.attributes.extract_tenant_header.input]
            logs = [otelcol.processor.attributes.extract_tenant_header.input]
          }
        }
        // Extract the X-Scope-OrgID request header into signal attributes.
        // The header is normalized by the receiver to metadata.x-scope-orgid.
        otelcol.processor.attributes "extract_tenant_header" {
          action {
            key          = "giantswarm.tenant.from-header"
            action       = "insert"
            from_context = "metadata.x-scope-orgid"
          }
          output {
            traces = [otelcol.processor.transform.promote_header_to_resource.input]
            metrics = [otelcol.processor.transform.promote_header_to_resource.input]
            logs = [otelcol.processor.transform.promote_header_to_resource.input]
          }
        }
        // Promote signal-level header attribute to resource attributes.
        // The attributes processor adds giantswarm.tenant.from-header at the signal level (span/log/metric).
        // This transform copies it to resource.attributes where tenant resolution can access it.
        otelcol.processor.transform "promote_header_to_resource" {
          error_mode = "ignore"
          trace_statements {
            context = "span"
            statements = [
              `set(resource.attributes["giantswarm.tenant.from-header"], span.attributes["giantswarm.tenant.from-header"]) where span.attributes["giantswarm.tenant.from-header"] != ""`,
              `delete_key(span.attributes, "giantswarm.tenant.from-header")`,
            ]
          }
          metric_statements {
            context = "datapoint"
            statements = [
              `set(resource.attributes["giantswarm.tenant.from-header"], datapoint.attributes["giantswarm.tenant.from-header"]) where datapoint.attributes["giantswarm.tenant.from-header"] != ""`,
              `delete_key(datapoint.attributes, "giantswarm.tenant.from-header")`,
            ]
          }
          log_statements {
            context = "log"
            statements = [
              `set(resource.attributes["giantswarm.tenant.from-header"], log.attributes["giantswarm.tenant.from-header"]) where log.attributes["giantswarm.tenant.from-header"] != ""`,
              `delete_key(log.attributes, "giantswarm.tenant.from-header")`,
            ]
          }
          output {
            traces = [otelcol.processor.transform.default.input]
            metrics = [otelcol.processor.transform.default.input]
            logs = [otelcol.processor.transform.default.input]
          }
        }
        // Add cluster metadata and resolve giantswarm.tenant for all OTLP signals.
        //
        // Tenant resolution:
        //   1. Label extraction  — giantswarm.tenant.from-label (set by k8sattributes from
        //      the pod label observability.giantswarm.io/tenant) is already in resource attributes
        //   2. Header extraction — giantswarm.tenant.from-header (promoted from signal attributes by
        //      the promote_header_to_resource transform) is in resource attributes
        //   3. Header promotion  — giantswarm.tenant.from-header is promoted to giantswarm.tenant
        //      only if the value matches an accepted tenant, overriding any label-derived value.
        //   4. Label promotion   — giantswarm.tenant.from-label is promoted to giantswarm.tenant
        //      only if the value matches an accepted tenant (and header was not matched).
        //   5. Cleanup — both temporary attributes are removed.
        //
        // Invalid, empty, or absent values from either source are never promoted, so signals
        // whose tenant cannot be resolved are dropped by the per-tenant filter processors.
        otelcol.processor.transform "default" {
          error_mode = "ignore"
          trace_statements {
            context = "resource"
            statements = [
              // Cluster metadata (OTel / k8s semantic conventions)
              `set(resource.attributes["k8s.cluster.name"], "test-installation")`,
              `set(resource.attributes["k8s.cluster.type"], "management_cluster")`,
              `set(resource.attributes["k8s.cluster.organization"], "test-organization")`,
              `set(resource.attributes["cloud.provider"], "capa")`,
              // Tenant resolution — step 1: promote valid pod-label value
              `set(resource.attributes["giantswarm.tenant"], "giantswarm") where resource.attributes["giantswarm.tenant.from-label"] == "giantswarm"`,
              // Tenant resolution — step 2: promote valid X-Scope-OrgID header (overrides label)
              `set(resource.attributes["giantswarm.tenant"], "giantswarm") where resource.attributes["giantswarm.tenant.from-header"] == "giantswarm"`,
              // Tenant resolution — step 3: clean up temporary attributes
              `delete_key(resource.attributes, "giantswarm.tenant.from-label")`,
              `delete_key(resource.attributes, "giantswarm.tenant.from-header")`,
            ]
          }
          metric_statements {
            context = "resource"
            statements = [
              // Cluster metadata (OTel / k8s semantic conventions)
              `set(resource.attributes["k8s.cluster.name"], "test-installation")`,
              `set(resource.attributes["k8s.cluster.type"], "management_cluster")`,
              `set(resource.attributes["k8s.cluster.organization"], "test-organization")`,
              `set(resource.attributes["cloud.provider"], "capa")`,
              // Tenant resolution — step 1: promote valid pod-label value
              `set(resource.attributes["giantswarm.tenant"], "giantswarm") where resource.attributes["giantswarm.tenant.from-label"] == "giantswarm"`,
              // Tenant resolution — step 2: promote valid X-Scope-OrgID header (overrides label)
              `set(resource.attributes["giantswarm.tenant"], "giantswarm") where resource.attributes["giantswarm.tenant.from-header"] == "giantswarm"`,
              // Tenant resolution — step 3: clean up temporary attributes
              `delete_key(resource.attributes, "giantswarm.tenant.from-label")`,
              `delete_key(resource.attributes, "giantswarm.tenant.from-header")`,
            ]
          }
          log_statements {
            context = "resource"
            statements = [
              // Cluster metadata (OTel / k8s semantic conventions)
              `set(resource.attributes["k8s.cluster.name"], "test-installation")`,
              `set(resource.attributes["k8s.cluster.type"], "management_cluster")`,
              `set(resource.attributes["k8s.cluster.organization"], "test-organization")`,
              `set(resource.attributes["cloud.provider"], "capa")`,
              // Tenant resolution — step 1: promote valid pod-label value
              `set(resource.attributes["giantswarm.tenant"], "giantswarm") where resource.attributes["giantswarm.tenant.from-label"] == "giantswarm"`,
              // Tenant resolution — step 2: promote valid X-Scope-OrgID header (overrides label)
              `set(resource.attributes["giantswarm.tenant"], "giantswarm") where resource.attributes["giantswarm.tenant.from-header"] == "giantswarm"`,
              // Tenant resolution — step 3: clean up temporary attributes
              `delete_key(resource.attributes, "giantswarm.tenant.from-label")`,
              `delete_key(resource.attributes, "giantswarm.tenant.from-header")`,
            ]
          }
          output {
            traces = [otelcol.processor.batch.default.input]
            metrics = [otelcol.processor.batch.default.input]
            logs = [otelcol.processor.batch.default.input]
          }
        }
        // Batch processor for efficient export.
        // send_batch_max_size caps the number of items per export call, preventing individual
        // gRPC messages from exceeding the server's 4 MB decompressed message size limit.
        // Both size fields are set to the same value so batch semantics are simple and predictable:
        // flush when send_batch_max_size items are queued, or when timeout elapses.
        otelcol.processor.batch "default" {
          send_batch_size     = 1024
          send_batch_max_size = 1024
          timeout             = "500ms"
          output {
            traces = [
              otelcol.processor.filter.giantswarm.input,
            ]
            metrics = [
              otelcol.processor.filter.giantswarm.input,
            ]
            logs = [
              otelcol.processor.filter.giantswarm.input,
            ]
          }
        }
        // Per-tenant routing
        otelcol.processor.filter "giantswarm" {
          traces {
            span = [`resource.attributes["giantswarm.tenant"] != "giantswarm"`]
          }
          metrics {
            datapoint = [`resource.attributes["giantswarm.tenant"] != "giantswarm"`]
          }
          logs {
            log_record = [`resource.attributes["giantswarm.tenant"] != "giantswarm"`]
          }
          output {
            traces = [otelcol.exporter.otlp.giantswarm_tempo.input]
            metrics = [otelcol.exporter.otlphttp.giantswarm_mimir.input]
            logs = [otelcol.exporter.otlphttp.giantswarm_loki.input]
          }
        }
        // OTLP gRPC exporter for traces — tenant giantswarm → Tempo
        otelcol.exporter.otlp "giantswarm_tempo" {
          client {
            auth     = otelcol.auth.basic.tempo_credentials.handler
            endpoint = convert.nonsensitive(remote.kubernetes.secret.credentials.data["tracing-otlp-url"])
            headers = {
              "X-Scope-OrgID" = "giantswarm",
            }
          }
        }
        // OTLP HTTP exporter for metrics — tenant giantswarm → Mimir
        // Mimir's distributor is configured with -distributor.otel-promote-resource-attributes
        // to automatically promote resource attributes (cluster metadata) to metric labels.
        otelcol.exporter.otlphttp "giantswarm_mimir" {
          client {
            auth     = otelcol.auth.basic.mimir_credentials.handler
            endpoint = convert.nonsensitive(remote.kubernetes.secret.credentials.data["metrics-otlp-url"])
            headers = {
              "X-Scope-OrgID" = "giantswarm",
            }
          }
        }
        // OTLP HTTP exporter for logs — tenant giantswarm → Loki
        otelcol.exporter.otlphttp "giantswarm_loki" {
          client {
            auth     = otelcol.auth.basic.loki_credentials.handler
            endpoint = convert.nonsensitive(remote.kubernetes.secret.credentials.data["logging-otlp-url"])
            headers = {
              "X-Scope-OrgID" = "giantswarm",
            }
          }
        }
    # Resource configuration based on https://github.com/giantswarm/giantswarm/issues/32655
    # CPU limits updated in https://github.com/giantswarm/giantswarm/issues/34619 to prevent throttling
    resources:
      limits:
        cpu: 500m
        memory: 256Mi
      requests:
        cpu: 50m
        memory: 128Mi
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
        - ALL
      readOnlyRootFilesystem: false
      runAsUser: 10
      runAsGroup: 10
      runAsNonRoot: true
      seccompProfile:
        type: RuntimeDefault
  controller:
    type: deployment
    replicas: 1
  crds:
    create: false
  extraObjects:
  # OTLP gateway service for traces, metrics and logs
  - apiVersion: v1
    kind: Service
    metadata:
      annotations:
        meta.helm.sh/release-name: alloy-events
        meta.helm.sh/release-namespace: kube-system
      labels:
        app.kubernetes.io/component: networking
        app.kubernetes.io/instance: alloy-events
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/name: alloy
        app.kubernetes.io/part-of: alloy
        application.giantswarm.io/team: atlas
        giantswarm.io/managed-by: alloy-events
        giantswarm.io/service-type: managed
        helm.sh/chart: alloy-1.1.0
      name: otlp-gateway
      namespace: kube-system
    spec:
      ports:
      - appProtocol: grpc
        name: otlp
        port: 4317
        protocol: TCP
        targetPort: 4317
      - appProtocol: http
        name: otlp-http
        port: 4318
        protocol: TCP
        targetPort: 4318
      selector:
        app.kubernetes.io/instance: alloy-events
        app.kubernetes.io/name: alloy
      type: ClusterIP

verticalPodAutoscaler:
  enabled: true
  # VPA configuration based on https://github.com/giantswarm/giantswarm/issues/32655
  resourcePolicy:
    containerPolicies:
    - containerName: alloy
      controlledResources:
      - memory
      controlledValues: "RequestsAndLimits"
