# This file was generated by observability-operator.
# It configures Alloy for events logging.
# - configMap is generated from events-logger.alloy.template and passed as a string
#   here and will be created by Alloy's chart.
# - Alloy runs as a deployment, with only 1 replica.
networkPolicy:
  cilium:
    ingress:
    - toPorts:
      - ports:
        # Alloy UI and API
        - port: "12345"
          protocol: TCP
        # OTLP gRPC receiver
        - port: "4317"
          protocol: "TCP"
        # OTLP HTTP receiver
        - port: "4318"
          protocol: "TCP"

alloy:
  alloy:
    configMap:
      create: true
      content: |-
        logging {
        	level  = "info"
        	format = "logfmt"
        }
        remote.kubernetes.secret "credentials" {
        	namespace = "kube-system"
        	name = "alloy-events"
        }
        // Kubernetes events source for Loki
        loki.source.kubernetes_events "default" {
        	namespaces = []
        	forward_to = [loki.write.default.receiver]
        }
        // Loki target configuration
        loki.write "default" {
        	endpoint {
        		max_backoff_period = "10m"
        		remote_timeout     = "60s"
        		tenant_id          = convert.nonsensitive(remote.kubernetes.secret.credentials.data["logging-tenant-id"])
        		url                = convert.nonsensitive(remote.kubernetes.secret.credentials.data["logging-url"])
        		basic_auth {
        			username = convert.nonsensitive(remote.kubernetes.secret.credentials.data["logging-username"])
        			password = remote.kubernetes.secret.credentials.data["logging-password"]
        		}
        		tls_config {
        			insecure_skip_verify = false
        		}
        	}
        	external_labels = {
        		cluster_id       = "test-cluster",
        		cluster_type     = "workload_cluster",
        		organization     = "test-organization",
        		provider         = "capa",
        		scrape_job       = "kubernetes-events",
        	}
        }
        // Basic authentication for Loki
        otelcol.auth.basic "loki_credentials" {
        	username = convert.nonsensitive(remote.kubernetes.secret.credentials.data["logging-username"])
        	password = remote.kubernetes.secret.credentials.data["logging-password"]
        }
        // OTLP receiver — accepts traces, metrics, and logs from cluster workloads.
        // include_metadata = true propagates HTTP headers and gRPC metadata to downstream
        // processors, enabling the X-Scope-OrgID header to be used for tenant routing.
        otelcol.receiver.otlp "default" {
        	grpc {
        		endpoint         = "0.0.0.0:4317"
        		include_metadata = true
        	}
        	http {
        		endpoint         = "0.0.0.0:4318"
        		include_metadata = true
        	}
        	output {
        		logs    = [otelcol.processor.k8sattributes.default.input]
        	}
        }
        // Add Kubernetes metadata to all OTLP signals.
        // The tenant pod label is extracted to giantswarm.tenant.from-label (a temporary
        // attribute) rather than directly to giantswarm.tenant; validation and final
        // assignment happen in the transform processor below.
        otelcol.processor.k8sattributes "default" {
        	extract {
        		metadata = [
        			"k8s.namespace.name",
        			"k8s.pod.name",
        			"k8s.container.name",
        		]
        		label {
        			key      = "observability.giantswarm.io/tenant"
        			tag_name = "giantswarm.tenant.from-label"
        		}
        		otel_annotations = true
        	}
        	output {
        		logs    = [otelcol.processor.attributes.extract_tenant_header.input]
        	}
        }
        // Extract the X-Scope-OrgID request header into a temporary resource attribute
        // giantswarm.tenant.from-header. The header value is validated against the accepted
        // tenant list in the transform processor; invalid or absent values are ignored.
        otelcol.processor.attributes "extract_tenant_header" {
        	action {
        		key          = "giantswarm.tenant.from-header"
        		action       = "insert"
        		from_context = "metadata.x-scope-orgid"
        	}
        	output {
        		logs    = [otelcol.processor.transform.default.input]
        	}
        }
        // Add cluster metadata and resolve giantswarm.tenant for all OTLP signals.
        //
        // Tenant resolution (applied identically to traces, metrics, and logs):
        //   1. Label promotion  — giantswarm.tenant.from-label (set by k8sattributes from
        //      the pod label observability.giantswarm.io/tenant) is promoted to
        //      giantswarm.tenant only if the value matches an accepted tenant.
        //   2. Header promotion — giantswarm.tenant.from-header (set by the attributes
        //      processor from the X-Scope-OrgID request header) is promoted to
        //      giantswarm.tenant only if the value matches an accepted tenant, overriding
        //      any label-derived value.
        //   3. Cleanup — both temporary attributes are removed.
        //
        // Invalid, empty, or absent values from either source are never promoted, so signals
        // whose tenant cannot be resolved are dropped by the per-tenant filter processors.
        otelcol.processor.transform "default" {
        	error_mode = "ignore"
        	log_statements {
        		context = "resource"
        		statements = [
        			// Cluster metadata
        			`set(attributes["giantswarm.cluster.id"], "test-cluster")`,
        			`set(attributes["giantswarm.cluster.type"], "workload_cluster")`,
        			`set(attributes["giantswarm.cluster.organization"], "test-organization")`,
        			`set(attributes["giantswarm.cluster.provider"], "capa")`,
        			// Tenant resolution — step 1: promote valid pod-label value
        			`set(attributes["giantswarm.tenant"], "giantswarm") where attributes["giantswarm.tenant.from-label"] == "giantswarm"`,
        			// Tenant resolution — step 2: promote valid X-Scope-OrgID header (overrides label)
        			`set(attributes["giantswarm.tenant"], "giantswarm") where attributes["giantswarm.tenant.from-header"] == "giantswarm"`,
        			// Tenant resolution — step 3: clean up temporary attributes
        			`delete_key(attributes, "giantswarm.tenant.from-label")`,
        			`delete_key(attributes, "giantswarm.tenant.from-header")`,
        		]
        	}
        	output {
        		logs    = [otelcol.processor.batch.default.input]
        	}
        }
        // Batch processor for efficient export
        otelcol.processor.batch "default" {
        	send_batch_size     = 8192
        	send_batch_max_size = 0
        	timeout             = "200ms"
        	output {
        		logs = [
        			otelcol.processor.filter.giantswarm.input,
        		]
        	}
        }
        // Per-tenant routing
        otelcol.processor.filter "giantswarm" {
        	logs {
        		log_record = [
        			`resource.attributes["giantswarm.tenant"] != "giantswarm"`,
        		]
        	}
        	output {
        		logs    = [otelcol.exporter.otlphttp.giantswarm_loki.input]
        	}
        }
        // OTLP HTTP exporter for logs — tenant giantswarm → Loki
        otelcol.exporter.otlphttp "giantswarm_loki" {
        	client {
        		auth     = otelcol.auth.basic.loki_credentials.handler
        		endpoint = convert.nonsensitive(remote.kubernetes.secret.credentials.data["logging-otlp-url"])
        		tls {
        			insecure_skip_verify = false
        		}
        		headers = {
        			"X-Scope-OrgID" = "giantswarm",
        		}
        	}
        }
    # Resource configuration based on https://github.com/giantswarm/giantswarm/issues/32655
    # CPU limits updated in https://github.com/giantswarm/giantswarm/issues/34619 to prevent throttling
    resources:
      limits:
        cpu: 500m
        memory: 256Mi
      requests:
        cpu: 50m
        memory: 128Mi
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
        - ALL
      readOnlyRootFilesystem: false
      runAsUser: 10
      runAsGroup: 10
      runAsNonRoot: true
      seccompProfile:
        type: RuntimeDefault
  controller:
    type: deployment
    replicas: 1
  crds:
    create: false
  extraObjects:
  # OTLP gateway service for traces/metrics/logs
  - apiVersion: v1
    kind: Service
    metadata:
      annotations:
        meta.helm.sh/release-name: alloy-events
        meta.helm.sh/release-namespace: kube-system
      labels:
        app.kubernetes.io/component: networking
        app.kubernetes.io/instance: alloy-events
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/name: alloy
        app.kubernetes.io/part-of: alloy
        application.giantswarm.io/team: atlas
        giantswarm.io/managed-by: alloy-events
        giantswarm.io/service-type: managed
        helm.sh/chart: alloy-1.1.0
      name: otlp-gateway
      namespace: kube-system
    spec:
      ports:
      - appProtocol: grpc
        name: otlp
        port: 4317
        protocol: TCP
        targetPort: 4317
      - appProtocol: http
        name: otlp-http
        port: 4318
        protocol: TCP
        targetPort: 4318
      selector:
        app.kubernetes.io/instance: alloy-events
        app.kubernetes.io/name: alloy
      type: ClusterIP

verticalPodAutoscaler:
  enabled: true
  # VPA configuration based on https://github.com/giantswarm/giantswarm/issues/32655
  resourcePolicy:
    containerPolicies:
    - containerName: alloy
      controlledResources:
      - memory
      controlledValues: "RequestsAndLimits"
